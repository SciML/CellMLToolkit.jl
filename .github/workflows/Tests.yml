name: CI
on:
  pull_request:
    branches:
      - master
    paths-ignore:
      - 'docs/**'
  push:
    branches:
      - master
    paths-ignore:
      - 'docs/**'
  schedule:
    - cron: '48 8 * * 5'
jobs:
  test:
    name: "Tests"
    strategy:
      fail-fast: false
      matrix:
        group:
          - Core
          - QA
        version:
          - '1'
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    uses: "SciML/.github/.github/workflows/tests.yml@v1"
    with:
      group: "${{ matrix.group }}"
      julia-version: "${{ matrix.version }}"
      os: "${{ matrix.os }}"
      julia-runtest-depwarn: "error"
    secrets: "inherit"
